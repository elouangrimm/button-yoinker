<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Stolen Buttons</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="shortcut icon" href="/images/icon-light-196.png">

    <link href="/images/icon-light-32.png" rel="icon" media="(prefers-color-scheme: light)"/>
    <link href="/images/icon-dark-32.png" rel="icon" media="(prefers-color-scheme: dark)"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' type='text/css' media='screen' href='stolen-buttons.css'>
</head>
<body>
    <nav id="navbar">
        <div class="left"></div>
        <div class="center">
            <h1 id="title">Stolen Buttons</h1>
        </div>
        <div class="right">
            <a class="button" type="button" id="delete-mode">Edit</a>
            <a class="button critical disabled delete-only" type="button" id="delete" disabled>Remove</a>
            <a class="button delete-only" type="button" id="exit-mode">Exit</a>
            <button class="mode-button mode-button-icon" type="button" id="theme-toggle" data-mode="system" aria-label="Theme mode: system"></button>
        </div>
    </nav>
    <div id="toolbar">
        <input id="search-input" type="search" placeholder="Search buttons…" autocomplete="off" spellcheck="false" aria-label="Search buttons" />
        <button class="mode-button" id="sort-toggle" data-order="newest" title="Sorted: newest first" aria-label="Sort order">
            ↓ Newest
        </button>
        <button class="mode-button mode-button-icon" id="import-btn" title="Import from JSON" aria-label="Import from JSON">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M224 136v72a8 8 0 0 1-8 8H40a8 8 0 0 1-8-8v-72"/><line x1="128" y1="160" x2="128" y2="40"/><polyline points="88 80 128 40 168 80"/></svg>
        </button>
        <input type="file" id="import-file-input" accept=".json" style="display:none" />
        <button class="mode-button mode-button-icon" id="export-btn" title="Export as JSON" aria-label="Export as JSON">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M224 136v72a8 8 0 0 1-8 8H40a8 8 0 0 1-8-8v-72"/><line x1="128" y1="40" x2="128" y2="160"/><polyline points="88 120 128 160 168 120"/></svg>
        </button>
    </div>
    <div id="stolen-buttons"></div>
    <p id="no-results" class="hidden">No buttons match your search.</p>
    <script src='stolen-buttons.js'></script>
</body>
</html>
